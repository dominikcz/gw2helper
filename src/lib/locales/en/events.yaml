tts: >-
  It is {time}.
  {plural, select,
    true {
      {inAdvance, plural,
        =0 {events: {eventsList} are starting now}
        one {in one minute events: {eventsList} are starting}
        other {in # minutes events: {eventsList} are starting}
      }
    }
    other {
      {inAdvance, plural,
        =0 {event: {eventsList} is starting now}
        one {in one minute event: {eventsList} is starting}
        other {in # minutes event: {eventsList} is starting}
      }
    }
  }
