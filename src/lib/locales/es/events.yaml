tts: |-
  Es {time}. {plural, select,
    true {
      {inAdvance, plural,
        =0 {Eventos: {eventsList} acaba de comenzar }
        one {Eventos: {eventsList} comienzan en un minuto}
        other {Eventos: {eventsList} comienzan en # minutos}
      }
    }
    other {
      {inAdvance, plural,
        =0 {Evento: {eventsList} acaba de comenzar }
        one {Evento: {eventsList} comienza en un minuto}
        other {Evento: {eventsList} comienza en # minutos}
      }
    }
  }
watched:
  alarm_sound: Sonido de alarma
  choose_times: 'Elige los horarios para tus alarmas:'
  empty_list: >-
    Aún no has añadido nada a la lista. Agregar elementos haciendo clic <img
    alt="not on list" class="icon-small" src="{img_url}"/> icono en cualquiera
